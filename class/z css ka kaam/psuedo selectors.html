<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Psuedo Selectors</title>
    <style>
        .container{
            border: 2px solid black;
            display: block;
            width : 233px;
            margin: auto;
        }
        input{
            display: block;
        }
        /**/
        input[type = 'text']
        {
            padding: 2px;
            border: 2px solid yellow;
        }
        a[target]
        {
            font-size: 23px;
            color: blueviolet;
        }a[target='_self']
        {
            font-size: 23px;
            color: rgb(226, 43, 141);
        }
        input[type = 'email']
        {
            color: cadetblue;
            border: 2px solid grey;
        }
        /*this will apply css for 3rd child*/
        li:nth-child(3){
            color:chartreuse;
        }
        li:nth-child(2n+0){
            color:rgb(255, 0, 30);
        }

    </style>
</head>
<body>
    <div class="container">
        <h1><a href="https://google.com" target="_blank">Go to Google</a></h1>
        <h1><a href="https://facebook.com" target="_self">Go to Facebook</a></h1>
       <form action="" class="form-control">
        <input type="text" placeholder="Enter your name">
        <input type="email" placeholder="Enter your E-mail">
        <input type="password" placeholder="Enter your password">
        <input type="submit" value="submit">
       </form>
        <li class="item1">item1</li>
        <li class="item2">item2</li>
        <li class="item3">item3</li>
        <li class="item4">item4</li>
        <li class="item5">item5</li>
        <li class="item6">item6</li>
        <li class="item7">item7</li>
        <li class="item8">item8</li>
        <li class="item9">item9</li>
        <li class="item10">item10</li>
    </div>
</body>
</html>
