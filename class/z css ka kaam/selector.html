<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS selectors  </title>
    <style>
        /*element selector*/
        p{
            border: 2px solid lightblue;
        }
        /*ID selector*/
        #firstpara{
            color: red;
        }
        /*class selector*/
        .bgYellow{
            color: green;
            background-color: yellow;
        }
        footer,span{
            background-color: lightblue;
        }
    </style>
</head>
<body>
    <h3>CSS selectors</h3>
    <p id="firstpara">this is a simple paragraph to demonstrate css selector s</p>
    <p id= " secondpara" class="redelemnt bgYellow">this is an another simple paragraph to demonstrate css selector s</p>
    <div>
        <p>this is an yet another simple paragraph to demonstrate css selector </p>
        <span>this is span</span>
        <footer>this is footer</footer>
    </div>
</body>
</html>
