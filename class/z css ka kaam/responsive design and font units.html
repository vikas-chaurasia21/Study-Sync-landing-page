<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>font size</title>
    <style>
        html{
            font-size: 25px;
        }
        .container{
            font-size: 10px;
            border: 2px solid black;
            width: 273px;
            width: 100vw;
            /*height: 127px;*/
            height: 100vh;/*vh mtlb poori height lena end tk*/
        }
        h1{
            text-align: center;
        }
        #id1{
            /*Meaning: em ka size parent element ke font-size pe depend karta hai.*/
           /* font-size: 3em;
            padding: 3em;*/
        }
        #id2{
            /*Meaning: rem ka size root element (html) ke font-size pe depend karta hai, na ki parent ke font-size pe.  */
           /* font-size: 3rem;
            padding: 3rem;*/
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="id1">this is first heading</h1>
        <h1 id="id2">this is second heading</h1>
        <h1 id="id3">this is third heading</h1>
    </div>
</body>
</html>
