<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>keyframes and animations</title>
</head>
<style>
    .container {
        display: flex;
        background-color: black;
    }

    .box {
        background-color: aquamarine;
        width: 250px;
        height: 250px;
        position: relative;
        animation-name: vikas;
        animation-name: vikasc;
        animation-duration: 1s;
        animation-iteration-count: infinite;
        animation-fill-mode: forwards;
        animation-timing-function: ease-in;
        /*animation-delay: 2s;*/
        animation: animation-name animation-duration /*animation-timing-function amimation-delay animation-iteration-count animation-fill-mode;*/
        
    }

    @keyframes vikasc {
        0% {
            top: 0px;
            left: 0px
        }

        25% {
            top: 250px;
            left: 0px;
        }

        75% {
            top: 250px;
            left: 250px;
        }

        100% {
            top: 0px;
            left: 250px;
        }
    }

    @keyframes vikas {
        from {
            width: 200px;
        }

        to {
            width: 1400px;
        }
    }
</style>

<body>
    <div class="container">
        <div class="box">
            this is box
        </div>
    </div>
</body>

</html>
