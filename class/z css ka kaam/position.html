<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>position</title>
    <style>
        .container{
            border: 2px solid black;
            background-color: aqua;
            height: 4000px;
        }
        .box{
            display: inline-block;
            border: 2px solid black;
            width: 150px;
            height: 150px;
            margin: 2px;
        }
        #box3{
            /*relative : element apni normal position se hilega vo
            position: relative;*/

           /* absolute: element ki btt hai :is relative to the parent of the first parent*/
            /*position: absolute;*/
            /* top: 34px;
             left: 34px;*/
            
            /*position: fixed;fixed kr deta hai vo move nhi krega apni jaggah se */

            /*sticky: position stick hojati hi jb iska use krte hai*/
            position: sticky;
            top: 3px;
            /*right: 4px;
            bottom: 2px;*/
        }
    </style>
</head>
<body>
    <div class="container">
    <div class="box" id="box1">1.</div>
    <div class="box" id="box2">2.</div>
    <div class="box" id="box3">3. chat with us</div>
    <div class="box" id="box4">4.</div>
    </div>
</body>
</html>
