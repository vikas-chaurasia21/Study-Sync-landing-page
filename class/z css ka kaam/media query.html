<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Query</title>
    <style>
        .box{
            text-align: center;
            font-size: 70px;
            text-decoration: underline;
            background-color: rgb(208, 255, 0);
            color: black;
            display: none;
        }
        @media only screen and (max-width:300px){
            #box1{
                display: block;
                background-color:blueviolet
            }
        }
        @media only screen and (min-width:300px) and (max-width:500px){
            #box2{
                display: block;
                background-color: rgb(222, 135, 197);
            }
        }
            @media only screen and (min-width:500px) and (max-width:800px)
            {
                #box3{
                display: block;
                background-color: rgb(222, 135, 135);
            }
        }
        @media only screen and (min-width:800px)
            {
                #box4{
                display: block;
                background-color: rgb(135, 164, 222);
            }
        }
    </style> 
</head>
<body>
    <div class="box" id="box1">english</div>
    <div class="box" id="box2">science</div>
    <div class="box" id="box3">computer</div>
    <div class="box" id="box4">maths</div>
</body>
</html>
