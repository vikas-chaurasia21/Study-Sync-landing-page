<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo selectors and more designing</title>
    <style>
        .container{
            border: 2px solid black;
            background-color: antiquewhite;
            padding: 34px;
            margin: 34px auto;
            width: 666px;
        }
        a:hover{
            color: blue;
            background-color:rgb(131, 123, 123)
        }
        a{
            text-decoration: none;
            color:black;
        }
        a:visited{
            background-color: chartreuse;
        }
        a:active{
            background-color:coral
        }
        .btn{
            font-family:fantasy;
            background-color: aqua;
            padding: 6px;
            border: none;
            cursor: pointer;
            font-size: 11px;
            border-radius: 4px;
        }
        .btn:hover{
            color: chocolate;
            background-color: blueviolet;
            border: 2px solid black;
        }
    </style>
</head>
<body>
    <div class="container" id="cont1">
        <h3>This is my heading </h3>
        <p>Lorem ipsum, dolor sit amet consectetur adipisicing elit. Facere tempora distinctio velit delectus, est provident officiis minus fuga dignissimos facilis. Quasi ex iste ea excepturi quia cum nam, vitae sequi ipsa natus porro eaque.</p>
        <a href="https://facebook.com" class="btn">Read more</a>
        <button class="btn">Contact us</button>
    </div>
</body>
</html>
