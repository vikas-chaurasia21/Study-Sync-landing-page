<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transition</title>
</head>
<style>
    body{
        background-color: black;
    }
    #box {
        display: flex;
        height: 200px;
        width: 200px;
        background-color: aqua;
        justify-content: center;
        align-items: center;
        transition-property: background-color;
        transition-duration: 2s;
        transition: all 3s;
         
    }
    #box:hover {
        background-color: aliceblue;
        height: 500px;
        width: 500px;
        font-size: 55px;
        
    }
</style>

<body>
    <h3>this is transition tutorial</h3>
    <div class="container">
        <div id="box">
            this is my box
        </div>
    </div>
</body>

</html>
