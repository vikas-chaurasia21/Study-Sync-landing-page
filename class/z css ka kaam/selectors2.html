<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>selectors</title>
    <style>
        h1{
            background-color: red;
            color:black; 
            font-weight: bold;
            text-align: center;
        }
        /*if p is contain by any li which is contained by div*/
        div p li{
            color: yellow;
            background-color: green;
            font-weight: bold;
        }
        /*div > p{/*div ke ander direct p*/
            /*color: yellow;
            background-color: green;
            font-weight: bold;
        }*/

        div + p{/*aisa paragraph jiska pichle element div hai*/
            color: white;
            background-color: black;
        }
      </style>
</head> 
<body>
    <h1>this is more on selector</h1>
    <div class="container">
        <div class="row">
            <ul>
                <li class="item"><p>this is another paragraph inside</p></li>
                <li><p>this is a paragraph</p></li>
            </ul>
            <p>this is another</p>
        </div>
        <p>this is an</p>
    </div>
    <p>this is annnn</p>
</body>
</html>
