<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>border and background</title>
    <style>
        #firstpara{

            background-color: blue;
            height: 100px;
            width : 75px;
            border-top:11px dotted rgb(119, 128, 0);
            border-right:11px dotted chocolate;
            border-left:11px dotted rgb(210, 192, 30);
            border-bottom:11px dotted rgb(210, 30, 180);
            /*border-width: 11px;
            border-color:green;
            border-style: dotted;
            border-radius: 20px; */
        }
        #secondpara{
            background-color: rgb(149, 0, 255);
            height: 100px;
            width : 75px;
            border-top:11px dotted rgb(119, 128, 0);
            border-right:11px dotted chocolate;
            border-left:11px dotted rgb(210, 192, 30);
            border-bottom:11px dotted rgb(210, 30, 180);
        }
        #thirdpara{
            height: 160px;
            width : 160px;
            background-image: url(channels4_profile.jpg);
            border: 2px solid red;
            background-repeat: no-repeat;
        }
    </style>
</head>
<body>
    <h3>this is heading</h3>
    <p id="firstpara">this is a paragraph</p>
    <h3>this is second heading</h3>
    <p id="secondpara">this is a second paragraph</p>
    <h3>this is third heading</h3>
    <p id="thirdpara">this is a third paragraph</p>
</body>
</html>
