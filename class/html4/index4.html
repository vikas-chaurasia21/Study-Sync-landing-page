<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
    <style>
        #hero{
            border: 0cqi;
            background-color: aquamarine;
            box-shadow: 0ch;
            border-color: blueviolet;
            animation-fill-mode: initial;
        }
    </style>
</head>
<body>
    <link rel="stylesheet" href="style.css">
    <h1 >Assistant for web dev course....</h1>
    <!--form tag ka use data ko lene ke liye krte hi-->
    <form action="post"><!--post ka mtlb hai ki data url m nhi dikhega-->
        <!--input tag ka use hum input lene ke liye krte hai -->
        <div>

            <label for="username">Enter your username</label>
            <!--label ek id ko tag dene ka use m ata h -->
            <input type="text" id="username" name="username" placeholder="Enter your username.">
        </div>
        <div>
            <input type="radio" id="male" name="gender" value="male">
            <label for="male">Male</label>
            <input type="radio" id="Female" name="gender" value="Female">
            <label for="Female">Female</label>
        </div>
        <div>
            <input type="checkbox" id="systumm" name="systumm" value="yes">

            <label for="systumm">systumm hi systumm</label>
        </div>
        <div>
            <!--in text area you can create a box where we can text like description-->
            <label for="comment">Enter your comment</label>
            <br>
            <textarea name="system" rows="5" cols="50">kr le tu bhi systumm</textarea>
        </div>
        <div>
            <select name="creator">

                <option value="default">Default</option>
                <option value="elvish yadav">Elvish yadav</option>
                <option value="carryminati">carryminati</option>
                <option value="ashish">Ashish</option>
            </select>
            <div>

                <select id="hero" name="heroes">
                    <option value="srk">srk</option>
                    <option value="rk">rk</option>
                    <option value="sal">sal</option>
                </select>
            </div>
        </div>
    </form>
</body>

</html>
