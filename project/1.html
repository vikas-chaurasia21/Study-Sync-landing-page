<!DOCTYPE html>
<html>
<head>
    <title>JS Function Example</title>
</head>
<body>

<script>
    function compareValues(a, b, c, d) {
        if (a > b && c > d) {
            alert(true);
        } else {
            alert(false);
        }
    }

    // Function call
    compareValues(3, 5, 8, 3);
</script>

</body>
</html>
