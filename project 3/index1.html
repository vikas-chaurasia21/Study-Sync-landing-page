<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Summary</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .container{
            width: 100vw;
            height: 100vh;
            background-color: #4d0080;
            background: linear-gradient(90deg, rgba(77, 0, 128, 1) 0%, rgba(133, 0, 20, 1) 73%, rgba(102, 2, 2, 1) 100%);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .box{
            width: 300px;
            height: 440px;
            background-color: white;
            border-radius: 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 20px;
        }
    </style> 
</head>
<body>
    <div class="container">
        <div class="box">

        </div>
    </div>
</body>
</html>
